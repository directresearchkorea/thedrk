name: Build and Deploy Blog

on:
  push:
    branches:
      - main
    paths:
      - 'tools/posts/**'
      - 'tools/build_post.py'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown beautifulsoup4
          
      - name: Build HTML Posts
        run: python tools/build_post.py
        
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add insights/ index.html sitemap.xml
          git commit -m "Auto-build HTML from new markdown posts" || echo "No changes to commit"
          git push
